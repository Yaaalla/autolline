<!DOCTYPE html>
<html class="dark" lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>إدارة المدونة | لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600;700&family=Cairo:wght@400;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c9a96e",
                        "background-dark": "#12110f",
                        "surface": "#1c1c1c",
                    },
                    fontFamily: {
                        "display": ["Manrope", "Cairo", "sans-serif"],
                        "serif": ["Cormorant Garamond", "serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .ql-toolbar.ql-snow {
            border-color: rgba(255, 255, 255, 0.1);
            background: #1c1c1c;
        }

        .ql-container.ql-snow {
            border-color: rgba(255, 255, 255, 0.1);
            font-family: 'Manrope', 'Cairo', sans-serif;
        }

        .ql-editor {
            color: #f1f5f9;
            text-align: right;
            min-height: 200px;
        }

        .ql-editor.ql-blank::before {
            color: #475569;
            left: auto;
            right: 15px;
        }

        .ql-snow .ql-stroke {
            stroke: #94a3b8;
        }

        .ql-snow .ql-fill {
            fill: #94a3b8;
        }

        .ql-snow .ql-picker {
            color: #94a3b8;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 font-display flex flex-col md:flex-row min-h-screen">
    <aside class="w-full md:w-64 border-l border-white/5 bg-surface p-8 text-right space-y-10 flex flex-col">
        <div class="flex items-center gap-2 mb-10 justify-end">
            <h1 class="font-serif text-2xl font-bold italic text-primary">AutoLine Admin</h1>
        </div>

        <nav class="flex-1 space-y-4">

            <a href="admin-cars.html"
                class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-400 text-sm font-bold transition-all">
                <span class="material-symbols-outlined">directions_car</span>
                السيارات
            </a>
            <a href="admin-blogs.html"
                class="flex items-center gap-3 p-3 rounded-xl bg-primary text-background-dark font-black text-sm">
                <span class="material-symbols-outlined">article</span>
                المدونة
            </a>

        </nav>
        <button id="logout-btn"
            class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-500/10 text-red-400 text-sm font-bold transition-all w-full text-right mt-20">
            <span class="material-symbols-outlined">logout</span>
            خروج
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        <div class="flex justify-between items-center mb-12">
            <button onclick="document.getElementById('blog-modal').classList.remove('hidden')"
                class="bg-primary text-background-dark px-6 py-2 rounded-lg font-black text-sm hover:bg-white transition-all shadow-xl">
                إضافة مقال جديد
            </button>
            <h2 class="font-serif text-3xl text-white italic">إدارة المحتوى</h2>
        </div>

        <div id="blogs-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loaded via JS -->
        </div>
    </main>

    <!-- Blog Modal -->
    <div id="blog-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-background-dark/95 backdrop-blur-sm">
        <div class="w-full max-w-2xl bg-surface p-10 rounded-3xl border border-white/5 text-right">
            <h3 id="modal-title" class="font-serif text-2xl text-white italic mb-10">إضافة مقال</h3>
            <form id="blog-form" class="space-y-6">
                <input type="hidden" id="blog-id" />
                <div>
                    <label class="block text-[10px] uppercase font-bold text-primary tracking-widest mb-2">عنوان
                        المقال</label>
                    <input type="text" id="title"
                        class="w-full bg-background-dark border-white/10 rounded-xl p-3 text-sm focus:ring-primary text-right"
                        required />
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold text-primary tracking-widest mb-2">رفع صورة
                        المقال</label>
                    <input type="file" id="blog-image-file" accept="image/*"
                        class="w-full bg-background-dark border-white/10 rounded-xl p-3 text-sm focus:ring-primary text-right text-slate-500" />
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold text-primary tracking-widest mb-2">أو رابط صورة
                        خارجي</label>
                    <input type="text" id="image_url"
                        class="w-full bg-background-dark border-white/10 rounded-xl p-3 text-sm focus:ring-primary text-right" />
                </div>
                <div>
                    <label
                        class="block text-[10px] uppercase font-bold text-primary tracking-widest mb-2">المحتوى</label>
                    <div id="editor-container" class="bg-background-dark border-white/10 rounded-xl text-right"
                        style="height: 300px; color: white;"></div>
                </div>
                <div class="flex gap-4 pt-6">
                    <button type="submit"
                        class="flex-1 bg-primary text-background-dark font-black py-3 rounded-xl uppercase tracking-widest hover:bg-white transition-all shadow-xl">حفظ</button>
                    <button type="button" onclick="document.getElementById('blog-modal').classList.add('hidden')"
                        class="flex-1 bg-white/5 text-white font-bold py-3 rounded-xl uppercase tracking-widest hover:bg-white/10 transition-all">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase.js';

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) window.location.href = 'admin-login.html';
        }

        async function fetchBlogs() {
            const { data, error } = await supabase.from('blogs').select('*').order('created_at', { ascending: false });
            if (error) return;

            const grid = document.getElementById('blogs-grid');
            grid.innerHTML = data.map(post => `
                <div class="bg-surface p-6 rounded-2xl border border-white/5 relative group">
                    <img src="${post.image_url || 'https://images.unsplash.com/photo-1542362567-b055002b91f4'}" class="w-full h-40 object-cover rounded-xl mb-6 grayscale group-hover:grayscale-0 transition-all"/>
                    <h3 class="text-white font-serif text-xl italic mb-4 truncate">${post.title}</h3>
                    <div class="flex justify-between items-center mt-6">
                        <button onclick="editBlog('${post.id}')" class="text-primary text-xs font-bold hover:underline">تعديل</button>
                        <button onclick="deleteBlog('${post.id}')" class="text-red-500 text-xs font-bold hover:underline">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        window.deleteBlog = async (id) => {
            if (!confirm('هل أنت متأكد من حذف هذا المقال؟')) return;
            const { error } = await supabase.from('blogs').delete().eq('id', id);
            if (!error) fetchBlogs();
        }

        window.editBlog = async (id) => {
            const { data: blog } = await supabase.from('blogs').select('*').eq('id', id).single();
            if (!blog) return;

            document.getElementById('blog-id').value = blog.id;
            document.getElementById('title').value = blog.title;
            document.getElementById('image_url').value = blog.image_url;
            quill.root.innerHTML = blog.content;

            document.getElementById('modal-title').textContent = 'تعديل مقال';
            document.getElementById('blog-modal').classList.remove('hidden');
        }

        document.getElementById('blog-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('blog-id').value;

            let imageUrl = document.getElementById('image_url').value;
            const file = document.getElementById('blog-image-file').files[0];

            if (file) {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                const { data, error: uploadError } = await supabase.storage.from('blogs').upload(fileName, file);

                if (uploadError) {
                    console.error('Upload Error:', uploadError);
                    alert('خطأ في رفع الصورة: ' + uploadError.message + '\nتأكد من وجود bucket باسم "blogs" في Supabase Storage');
                    return;
                }

                const { data: { publicUrl } } = supabase.storage.from('blogs').getPublicUrl(fileName);
                imageUrl = publicUrl;
            }

            const postData = {
                title: document.getElementById('title').value,
                image_url: imageUrl,
                content: quill.root.innerHTML,
            };

            if (id) {
                const { error: updateError } = await supabase.from('blogs').update(postData).eq('id', id);
                if (updateError) alert('خطأ في التحديث: ' + updateError.message);
            } else {
                const { data: { user } } = await supabase.auth.getUser();
                const { error: insertError } = await supabase.from('blogs').insert({ ...postData, admin_id: user.id });
                if (insertError) alert('خطأ في الإضافة: ' + insertError.message);
            }

            document.getElementById('blog-modal').classList.add('hidden');
            document.getElementById('blog-form').reset();
            quill.setContents([]);
            fetchBlogs();
        });

        // Initialize Quill
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'direction': 'rtl' }, { 'align': [] }],
                    ['clean']
                ]
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'admin-login.html';
        });

        checkAuth();
        fetchBlogs();
    </script>
</body>

</html>
